;----------------------------------------------------------------------------------------------------------------
; SpeedoIV-CE -- Config.ini
;
; Live-reloads every ~1 second. No restart needed for tweaks below.
; Toggle visibility with the configured ToggleKey (default F6).
;
; Coordinate system:
;   ScreenAlign picks a corner. PositionX/PositionY are offsets FROM
;   that corner (always >= 0). For B (bottom) PositionY moves the
;   speedometer UP; for R (right) PositionX moves it LEFT.
;----------------------------------------------------------------------------------------------------------------

[Config]

; Debug = true forces a fresh SpeedoIV-CE.log every launch with full
; verbose output (useful when reporting issues). Debug = false (default)
; keeps the plugin silent; it only creates / appends to the log if a
; warning or error occurs, prepending ~64 lines of recent context.
Debug = false

; Visible by default at game start. F6 toggles at runtime.
Autostart = true

; ToggleKey: VK code. Common values:
;   117 = F6  (default; F5 is reserved by GTA IV quicksave)
;   118 = F7
;   119 = F8
;    96 = Numpad 0
ToggleKey = 117

; ----- Texture sizing -----
; TexSizeX/Y is auto-detected from the loaded Bck.png on first frame.
; You normally never need to set these manually.
TexSizeX = 1024.0
TexSizeY = 1024.0

; ----- Units / range -----
EnableKMH = true
MaxSpeed = 280.0

; ----- Placement -----
; ScreenAlign: two chars, vertical then horizontal.
;   BL = bottom-left, BR = bottom-right, TL = top-left, TR = top-right.
ScreenAlign = BL

; Offsets from the chosen corner, in pixels.
; Tuned for 1080p; adjust freely for other resolutions.
PositionX = 36.0
PositionY = 36.0

; Displayed sprite size in pixels.
SizeX = 256.0
SizeY = 256.0

; ----- Needle calibration -----
; Angle = static rotation applied to BOTH the dial face and the needle
; (degrees, clockwise). Use this to rotate the whole speedometer if
; your dial markings don't start where you expect.
Angle = 0.0

; SweepDeg = total degrees the needle rotates from 0 km/h to MaxSpeed.
; Default 280 matches the bundled "Default" dial face. Increase if the
; needle stops short of MaxSpeed; decrease if it overshoots.
SweepDeg = 280.0

; ----- Cosmetics -----
; 0..255 opacity. 255 = fully opaque.
Alpha = 220

; SkinFolder names a subfolder under SpeedoIV\ that contains Bck.png
; and Pin.png. Drop your own folder beside "Default" to ship a custom
; skin and change this line.
SkinFolder = Default
